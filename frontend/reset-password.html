<style>
*{font-family:'DM Sans',system-ui,sans-serif;box-sizing:border-box;margin:0;padding:0}
.syne{font-family:'Syne',sans-serif}
body{min-height:100vh;background:#F9FAFB;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 36px;width:100%;max-width:420px}
.inp-wrap{position:relative}
.inp{width:100%;padding:13px 44px 13px 16px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:15px;color:#1F2937;outline:none;transition:all .2s;background:#FAFAFA}
.inp:focus{border-color:#FFD23F;background:#fff;box-shadow:0 0 0 4px rgba(255,210,63,.14)}
.inp::placeholder{color:#9CA3AF}
.eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF;padding:0;transition:color .2s}
.eye:hover{color:#374151}
.btn{width:100%;padding:14px;background:#1F2937;color:#FFD23F;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;border-radius:12px;border:none;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:hover{background:#111827;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alertbox{padding:12px 14px;border-radius:10px;font-size:14px;font-weight:500;display:none;margin-bottom:14px}
.err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.ok{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
.req{display:flex;align-items:center;gap:8px;font-size:13px;color:#9CA3AF;transition:color .2s;margin-bottom:6px}
.req.met{color:#16A34A}.req-dot{width:6px;height:6px;border-radius:50%;background:#D1D5DB;flex-shrink:0;transition:background .2s}.req.met .req-dot{background:#16A34A}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,210,63,.3);border-top-color:#FFD23F;border-radius:50%;animation:sp .7s linear infinite;display:none}
@keyframes sp{to{transform:rotate(360deg)}}

/* RTL support */
body.rtl { direction: rtl; text-align: right; }
body.rtl .inp { text-align: right; }
body.rtl .divider { flex-direction: row-reverse; }

    <h1 class="syne" style="font-size:24px;font-weight:800;color:#111827;margin-bottom:8px;letter-spacing:-.5px">Set new password</h1>
    <p style="color:#6B7280;font-size:14px;line-height:1.6">Your new password must differ from your previous one.</p>
  </div>

  <div id="invalidMsg" style="display:none;text-align:center">
    <p style="color:#DC2626;font-weight:500;margin-bottom:16px">This reset link is invalid or has expired.</p>
    <a href="forgot-password.html" class="btn" style="text-decoration:none;display:inline-flex">Request new link</a>
  </div>

  <div id="formSection">
    <div class="alertbox err" id="errBox"></div>
    <form id="rpf" novalidate>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">New password</label>
        <div class="inp-wrap">
          <input type="password" id="np" class="inp" placeholder="Enter new password" autocomplete="new-password" oninput="ckReqs(this.value)"/>
          <button type="button" class="eye" onclick="tog('np',this)"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
        </div>
        <div style="margin-top:12px">
          <div class="req" id="r1"><div class="req-dot"></div>At least 8 characters</div>
          <div class="req" id="r2"><div class="req-dot"></div>One uppercase letter</div>
          <div class="req" id="r3"><div class="req-dot"></div>One number</div>
        </div>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Confirm new password</label>
        <div class="inp-wrap">
          <input type="password" id="cp" class="inp" placeholder="Confirm your password" autocomplete="new-password"/>
          <button type="button" class="eye" onclick="tog('cp',this)"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
        </div>
      </div>
      <button type="submit" id="rpb" class="btn">
        <span id="rpbt">Reset Password</span>
        <div class="spin" id="rpsp"></div>
      </button>
    </form>
  </div>
</div>

<div class="card" id="successCard" style="display:none;text-align:center">
  <div style="width:56px;height:56px;border-radius:16px;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
    <svg width="28" height="28" fill="none" stroke="#16A34A" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </div>
  <h2 class="syne" style="font-size:22px;font-weight:800;color:#111827;margin-bottom:8px">Password updated!</h2>
  <p style="color:#6B7280;font-size:14px;margin-bottom:28px">Your password has been updated successfully. You can now log in.</p>
  <a href="login.html" class="btn" style="text-decoration:none">Back to Login</a>
</div>

<script>
const API=window.location.origin+'/api/auth';
const tok=new URLSearchParams(location.search).get('token');
if(!tok){document.getElementById('formSection').style.display='none';document.getElementById('invalidMsg').style.display='block'}
function tog(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
function ckReqs(pw){document.getElementById('r1').classList.toggle('met',pw.length>=8);document.getElementById('r2').classList.toggle('met',/[A-Z]/.test(pw));document.getElementById('r3').classList.toggle('met',/[0-9]/.test(pw))}
document.getElementById('rpf').addEventListener('submit',async e=>{
  e.preventDefault();
  const np=document.getElementById('np').value, cp=document.getElementById('cp').value;
  const err=document.getElementById('errBox');
  if(!np||!cp){err.textContent='Please fill in all fields.';err.style.display='block';return}
  if(np.length<8){err.textContent='Password must be at least 8 characters.';err.style.display='block';return}
  if(np!==cp){err.textContent='Passwords do not match.';err.style.display='block';return}
  document.getElementById('rpbt').textContent='Resetting…';document.getElementById('rpsp').style.display='block';document.getElementById('rpb').disabled=true;
  try{
    const r=await fetch(API+'/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok,newPassword:np})});
    const d=await r.json();
    if(!r.ok){
      if(r.status===400){document.getElementById('formSection').style.display='none';document.getElementById('invalidMsg').style.display='block';return}
      throw new Error(d.message||'Reset failed');
    }
    document.getElementById('mainCard').style.display='none';
    document.getElementById('successCard').style.display='block';
  }catch(err2){document.getElementById('errBox').textContent=err2.message;document.getElementById('errBox').style.display='block'}
  finally{document.getElementById('rpbt').textContent='Reset Password';document.getElementById('rpsp').style.display='none';document.getElementById('rpb').disabled=false}
});
</script>

<script>
// ── i18n init for this page ──────────────────────────────────
(function() {
  // Apply saved language on page load (no reload needed)
  var lang = localStorage.getItem('retlify_lang') || localStorage.getItem('lang') || 'en';
  if (typeof I18n !== 'undefined') {
    I18n.init({ language: lang }).then(function(code) {
      // Apply to any language selectors on this page
      document.querySelectorAll('.retlify-lang-select').forEach(function(sel) {
        I18n.populateSelect(sel, code);
      });
    });
  }
  // After login/signup — save language from user object
  var origOnLoad = window.onload;
  window.addEventListener('retlify:langchange', function(e) {
    // Keep localStorage in sync with both keys for compatibility
    localStorage.setItem('lang', e.detail.lang);
    localStorage.setItem('retlify_lang', e.detail.lang);
  });
})();
</script>
